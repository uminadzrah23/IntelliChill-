<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FoodTrack – Add Food</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .steps-bar { display:flex; align-items:center; justify-content:center; gap:0; margin-bottom:2rem; }
    .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
    .step-circle { width:38px; height:38px; border-radius:50%; border:2px solid var(--border); background:var(--card); color:var(--muted); font-weight:700; font-size:0.85rem; display:flex; align-items:center; justify-content:center; transition:all 0.3s; }
    .step.active .step-circle { background:var(--nav-bg); border-color:var(--nav-bg); color:#fff; box-shadow:0 0 0 4px rgba(13,31,16,0.12); }
    .step.done .step-circle   { background:var(--green);  border-color:var(--green);  color:#fff; }
    .step-label { font-size:0.72rem; color:var(--muted); white-space:nowrap; font-weight:500; }
    .step.active .step-label { color:var(--nav-bg); font-weight:700; }
    .step.done .step-label   { color:var(--green); }
    .step-line { flex:1; height:2px; background:var(--border); margin:0 10px; margin-bottom:24px; transition:background 0.3s; min-width:40px; border-radius:2px; }
    .step-line.done { background:var(--green); }
    .upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:2.8rem 1rem; text-align:center; cursor:pointer; transition:all 0.2s; background:#fafcfa; position:relative; }
    .upload-zone:hover, .upload-zone.dragover { border-color:var(--green); background:var(--green-light); }
    .upload-zone .icon { font-size:2.8rem; margin-bottom:12px; }
    .upload-zone p { color:var(--muted); font-size:0.9rem; }
    .upload-zone p strong { color:var(--green); }
    .upload-zone .file-types { font-size:0.74rem; color:var(--muted); margin-top:8px; opacity:0.7; }
    #file-input { display:none; }
    #preview-container { display:none; margin-top:14px; position:relative; }
    #preview-img { width:100%; max-height:220px; object-fit:cover; border-radius:10px; border:1px solid var(--border); }
    .preview-change { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.6); color:#fff; border:none; padding:5px 12px; border-radius:999px; font-size:0.75rem; cursor:pointer; font-family:'Outfit',sans-serif; font-weight:500; }
    .btn-scan { width:100%; background:var(--nav-bg); color:#fff; border:none; padding:15px; border-radius:var(--radius-sm); font-family:'Outfit',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:1rem; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-scan:hover { background:#1a3a1f; transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,0.15); }
    .btn-scan:disabled { background:#c5cec6; cursor:not-allowed; transform:none; box-shadow:none; }
    .scan-loader { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #result-box { display:none; margin-top:1.2rem; border-radius:var(--radius-sm); overflow:hidden; animation:fadeUp 0.4s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .result-header { background:var(--green); color:#fff; padding:10px 18px; font-size:0.8rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; display:flex; align-items:center; gap:6px; }
    .result-body { background:var(--green-light); border:1px solid var(--green-mid); border-top:none; padding:1rem 1.4rem; }
    .result-food-name { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; color:#0d7a58; }
    .result-confidence { font-size:0.8rem; color:var(--green); margin-top:3px; font-weight:500; }
    #manual-form { display:none; margin-top:1.2rem; animation:fadeUp 0.4s ease; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-size:0.78rem; font-weight:700; color:var(--muted); margin-bottom:7px; text-transform:uppercase; letter-spacing:0.06em; }
    .form-group input { width:100%; padding:11px 16px; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:'Outfit',sans-serif; font-size:0.9rem; color:var(--text); background:var(--card); outline:none; transition:all 0.2s; }
    .form-group input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(22,163,127,0.12); }
    .btn-save { width:100%; background:var(--green); color:#fff; border:none; padding:15px; border-radius:var(--radius-sm); font-family:'Outfit',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-save:hover { background:#0d8a6a; transform:translateY(-1px); box-shadow:0 4px 14px rgba(22,163,127,0.3); }
    .btn-save:disabled { background:#c5cec6; cursor:not-allowed; transform:none; box-shadow:none; }
    .save-loader { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
    #toast { position:fixed; bottom:28px; right:28px; background:var(--nav-bg); color:#fff; padding:13px 22px; border-radius:999px; font-size:0.88rem; font-weight:500; opacity:0; transform:translateY(12px); transition:all 0.3s ease; z-index:999; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,0.15); }
    #toast.show { opacity:1; transform:translateY(0); }
    .divider { text-align:center; color:var(--muted); font-size:0.8rem; margin:1.2rem 0; position:relative; font-weight:500; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:var(--border); }
    .divider::before { left:0; }
    .divider::after  { right:0; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">🥦 Food<span>Track</span></div>
    <a href="index.html" class="nav-btn">← Dashboard</a>
  </nav>

  <div class="add-food-wrapper">
    <a href="index.html" class="back-link">← Back to Dashboard</a>

    <div class="steps-bar">
      <div class="step active" id="step1">
        <div class="step-circle">1</div>
        <div class="step-label">Upload Image</div>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step" id="step2">
        <div class="step-circle">2</div>
        <div class="step-label">AI Detection</div>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step" id="step3">
        <div class="step-circle">3</div>
        <div class="step-label">Save Food</div>
      </div>
    </div>

    <div class="page-header">
      <h1>Scan Your Food</h1>
      <p>Upload a photo and our AI will detect what it is</p>
    </div>

    <div class="form-card">
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📷</div>
        <p><strong>Click to upload</strong> a food image</p>
        <p>or drag and drop here</p>
        <p class="file-types">Supports JPG, PNG, WEBP</p>
        <div id="preview-container">
          <img id="preview-img" src="" alt="Preview" />
          <button class="preview-change" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Change</button>
        </div>
      </div>
      <input type="file" id="file-input" accept="image/*" />

      <button class="btn-scan" id="scan-btn" disabled onclick="scanFood()">
        <span id="scan-label">🔍 Scan Food</span>
        <div class="scan-loader" id="scan-loader"></div>
      </button>

      <div id="result-box">
        <div class="result-header">✅ Food Detected!</div>
        <div class="result-body">
          <div class="result-food-name" id="result-food-name">Apple</div>
          <div class="result-confidence" id="result-confidence">Detected by AI</div>
        </div>
      </div>

      <div class="divider" id="manual-divider" style="display:none">or edit manually</div>

      <div id="manual-form">
        <div class="form-group">
          <label>Food Name</label>
          <input type="text" id="input-food-name" placeholder="e.g. Apple" />
        </div>
        <div class="form-group">
          <label>Date Added</label>
          <input type="date" id="input-date-added" />
        </div>
        <div class="form-group">
          <label>Estimated Expiry Date</label>
          <input type="date" id="input-expiry-date" />
        </div>
        <button class="btn-save" id="save-btn" onclick="saveFood()">
          <span id="save-label">💾 Save to Dashboard</span>
          <div class="save-loader" id="save-loader"></div>
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc }
      from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyCH3exGIRj84tezVtgKJ9U93ERa6ubgE-w",
      authDomain:        "intellichill.firebaseapp.com",
      projectId:         "intellichill",
      storageBucket:     "intellichill.firebasestorage.app",
      messagingSenderId: "388845708926",
      appId:             "1:388845708926:web:650f54cee14a5312cf1a2f"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const COLLECTION = "food_id";

    // ✅ SMART EXPIRY — science-based shelf life by food type
    const EXPIRY_DAYS = {
      apple:8, banana:5, orange:10, grape:7, strawberry:3, watermelon:5,
      mango:5, lemon:14, milk:7, egg:21, bread:5, carrot:14, broccoli:5,
      tomato:7, chicken:2, fish:2, rice:180, cheese:14, butter:30,
      lettuce:7, spinach:5, potato:21, onion:30, garlic:60, cucumber:7,
      avocado:4, pear:5, peach:4, plum:4, blueberry:7, raspberry:3,
    };

    function getSmartExpiry(foodName) {
      const name = foodName.toLowerCase();
      for (const [key, days] of Object.entries(EXPIRY_DAYS)) {
        if (name.includes(key)) {
          const d = new Date();
          d.setDate(d.getDate() + days);
          return { date: d.toISOString().split('T')[0], days };
        }
      }
      const d = new Date();
      d.setDate(d.getDate() + 7);
      return { date: d.toISOString().split('T')[0], days: 7 };
    }

    const fileInput      = document.getElementById('file-input');
    const uploadZone     = document.getElementById('upload-zone');
    const previewCont    = document.getElementById('preview-container');
    const previewImg     = document.getElementById('preview-img');
    const scanBtn        = document.getElementById('scan-btn');
    const scanLabel      = document.getElementById('scan-label');
    const scanLoader     = document.getElementById('scan-loader');
    const resultBox      = document.getElementById('result-box');
    const resultFoodName = document.getElementById('result-food-name');
    const resultConf     = document.getElementById('result-confidence');
    const manualForm     = document.getElementById('manual-form');
    const manualDivider  = document.getElementById('manual-divider');
    const saveBtn        = document.getElementById('save-btn');
    const saveLabel      = document.getElementById('save-label');
    const saveLoader     = document.getElementById('save-loader');

    document.getElementById('input-date-added').value = new Date().toISOString().split('T')[0];

    fileInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        previewCont.style.display = 'block';
        scanBtn.disabled = false;
        resultBox.style.display = 'none';
        manualForm.style.display = 'none';
        manualDivider.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
      }
    });

    function setStep(n) {
      for (let i = 1; i <= 3; i++) {
        const s = document.getElementById('step' + i);
        s.classList.remove('active','done');
        if (i < n) s.classList.add('done');
        if (i === n) s.classList.add('active');
      }
      for (let i = 1; i <= 2; i++)
        document.getElementById('line' + i).classList.toggle('done', i < n);
    }

    window.scanFood = async function() {
      scanBtn.disabled = true;
      scanLabel.style.display = 'none';
      scanLoader.style.display = 'block';
      resultBox.style.display = 'none';
      manualForm.style.display = 'none';
      manualDivider.style.display = 'none';
      setStep(2);

      try {
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        const res = await fetch('https://unsounded-kristi-gapingly.ngrok-free.dev/detect', {
          method: 'POST',
          headers: { 'ngrok-skip-browser-warning': 'true' },
          body: formData
        });

        if (!res.ok) throw new Error('Server error: ' + res.status);
        const data = await res.json();
        const foodName = data.detected_food || '';

        scanLabel.style.display = 'inline';
        scanLoader.style.display = 'none';
        scanBtn.disabled = false;

        if (!foodName || foodName === 'No object detected') {
          showToast('⚠️ No food detected. Try a clearer photo!');
          setStep(1);
        } else {
          showResult(foodName);
          setStep(3);
        }
      } catch (err) {
        console.error('Flask API error:', err);
        showToast('⚠️ Could not connect to AI. Is Flask running?');
        scanLabel.style.display = 'inline';
        scanLoader.style.display = 'none';
        scanBtn.disabled = false;
        setStep(1);
      }
    };

    function showResult(foodName) {
      const smart = getSmartExpiry(foodName);
      resultFoodName.textContent = foodName;
      resultConf.textContent = '✅ Detected by AI · Suggested expiry: ' + smart.days + ' days';
      resultBox.style.display = 'block';
      manualDivider.style.display = 'block';
      manualForm.style.display = 'block';
      document.getElementById('input-food-name').value = foodName;
      document.getElementById('input-expiry-date').value = smart.date;
    }

    window.saveFood = async function() {
      const name   = document.getElementById('input-food-name').value.trim();
      const added  = document.getElementById('input-date-added').value;
      const expiry = document.getElementById('input-expiry-date').value;

      if (!name || !added || !expiry) { showToast('⚠️ Please fill in all fields!'); return; }

      saveBtn.disabled = true;
      saveLabel.style.display = 'none';
      saveLoader.style.display = 'block';

      try {
        await addDoc(collection(db, COLLECTION), {
          food_name:        name,
          date_added:       added,
          estimated_expiry: expiry,
          expiry_date:      null
        });
        showToast('✅ ' + name + ' saved to dashboard!');
        setTimeout(() => window.location.href = 'index.html', 1500);
      } catch (err) {
        console.error('Firebase save error:', err);
        showToast('⚠️ Could not save. Check Firebase connection.');
        saveBtn.disabled = false;
        saveLabel.style.display = 'inline';
        saveLoader.style.display = 'none';
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
